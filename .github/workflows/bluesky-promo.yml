# Bluesky Release Promotion
#
# Triggered when the Release workflow completes successfully.
# Posts a short announcement to Bluesky via the atproto SDK.

name: Bluesky Release Promotion

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

# Only read access is needed — this workflow does not push to the repo
permissions:
  contents: read

jobs:
  promote:
    name: Post to Bluesky
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt

      - name: Post release announcement to Bluesky
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          GITHUB_RELEASE_BODY: ${{ github.event.release.body }}
        run: python scripts/promote_release.py

      - name: Like recent posts from sheep-cat.bsky.social
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          BSKY_LIKE_ACCOUNT: sheep-cat.bsky.social
        run: python scripts/like_recent_posts.py
